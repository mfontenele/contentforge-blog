baseURL = "https://agentscodex.com/"
languageCode = "en-us"
title = "Agents' Codex"
theme = "PaperMod"
enableRobotsTXT = true
enableGitInfo = true

[frontmatter]
  lastmod = [":git", "lastmod", "date"]

[related]
  threshold = 30
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "keywords"
    weight = 80

[pagination]
  pagerSize = 10

[params]
  env = "production"
  author = "Agents' Codex"
  description = "Practical, no-hype insights on AI agents — cost optimization, multi-agent architecture, and real-world operations."
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  disableScrollToTop = false
  comments = false

[params.homeInfoParams]
  Title = "Agents’ Codex"
  Content = "Practical, no-hype writing on AI agents — cost control, multi-agent architecture, and real-world operations."

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 10

[[menu.main]]
  name = "Privacy"
  url = "/privacy/"
  weight = 20