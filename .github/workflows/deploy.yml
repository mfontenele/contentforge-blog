name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Pre-render mermaid diagrams
        run: bash scripts/render-mermaid.sh

      - name: Build
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Patch RSS mermaid diagrams
        run: python3 scripts/patch-rss-mermaid.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify-indexnow:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect changed content and ping IndexNow
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- content/ config.toml layouts/ static/ 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            echo "No content changes detected, skipping IndexNow"
            exit 0
          fi

          # Build URL list from sitemap (all pages — IndexNow handles dedup)
          URLS=$(grep -oP '<loc>\K[^<]+' <(curl -s https://agentscodex.com/sitemap.xml) || true)
          if [ -z "$URLS" ]; then
            echo "Could not fetch sitemap, pinging homepage only"
            URLS="https://agentscodex.com/"
          fi

          URL_JSON=$(echo "$URLS" | jq -R . | jq -s .)

          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{\"host\":\"agentscodex.com\",\"key\":\"649c42d74bbd116c598b0891f39a8b42\",\"urlList\":$URL_JSON}" \
            -o /dev/null -w "IndexNow response: %{http_code}\n"
